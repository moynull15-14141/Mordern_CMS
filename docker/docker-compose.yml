services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      target: build
    env_file:
      - ../config/env/development.env
    ports:
      - '4000:4000'
    volumes:
      - ..:/app
      - backend_node_modules:/app/node_modules
    command: ["corepack", "pnpm", "-C", "apps/backend", "run", "dev"]

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      target: build
      args:
        APP: apps/web
    env_file:
      - ../config/env/development.env
    ports:
      - '3000:3000'
    volumes:
      - ..:/app
      - web_node_modules:/app/node_modules
    command: ["corepack", "pnpm", "-C", "apps/web", "run", "dev"]

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      target: build
      args:
        APP: apps/admin
    env_file:
      - ../config/env/development.env
    ports:
      - '3001:3000'
    volumes:
      - ..:/app
      - admin_node_modules:/app/node_modules
    command: ["corepack", "pnpm", "-C", "apps/admin", "run", "dev"]

volumes:
  backend_node_modules:
  web_node_modules:
  admin_node_modules:
